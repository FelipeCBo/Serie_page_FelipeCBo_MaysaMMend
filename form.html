<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Form</title>
</head>
<body>

    <div class="header">
        <div class="menu">
            <div class="home_button"><a href="/index.html">Home</a></div>
            <div class="card_button"><a href="/card.html">Card</a></div>
            <div class="cad_button"><a href="/form.html">Cadastro</a></div>
        </div>
        <div class="page_name element"><h1>- Mafe -</h1></div>
        <div class="background_button element" id="background_button">Button</div>
    </div>

    <form>

        <div class="form-group">
            <label for="sname">Nome da série</label>
            <input type="name" name="sname" id="sname" required>
        </div>
        <div class="form-group">
            <label for="image">Imagem</label>
            <input type="file" name="image" id="image" required>
        </div>
        <div class="form-group">
            <label for="desc">Escreva sobre a série</label>
            <textarea name="desc" id="desc" required></textarea>
        </div>

        <button type="submit" id="submit_button" class="form-group">Enviar série</button>
        
    </form>

    <script src="script.js" defer></script>
</body>
</html>
